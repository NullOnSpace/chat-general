name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: chat-server
            asset_name: chat-server-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: chat-server
            asset_name: chat-server-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: chat-server.exe
            asset_name: chat-server-windows-x86_64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          retention-days: 1

  create-release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archive (Linux)
        run: |
          cd artifacts
          tar -czvf chat-server-linux-x86_64.tar.gz chat-server-linux-x86_64

      - name: Create release archive (macOS)
        run: |
          cd artifacts
          tar -czvf chat-server-macos-x86_64.tar.gz chat-server-macos-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Chat-General ${{ steps.get_version.outputs.VERSION }}
            
            ### Downloads
            - **Linux**: `chat-server-linux-x86_64.tar.gz`
            - **macOS**: `chat-server-macos-x86_64.tar.gz`
            - **Windows**: `chat-server-windows-x86_64.exe`
            
            ### Installation
            See [DEPLOYMENT.md](docs/DEPLOYMENT.md) for installation instructions.
          files: |
            artifacts/chat-server-linux-x86_64.tar.gz
            artifacts/chat-server-macos-x86_64.tar.gz
            artifacts/chat-server-windows-x86_64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}