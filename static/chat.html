<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container {
            height: calc(100vh - 64px);
        }
        .message-list {
            height: calc(100% - 80px);
            overflow-y: auto;
        }
        .conversation-list {
            height: calc(100% - 60px);
            overflow-y: auto;
        }
        .message-bubble-sent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .message-bubble-received {
            background: #f3f4f6;
        }
        .online-indicator {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid white;
        }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
        .sidebar-hidden {
            transform: translateX(-100%);
        }
        @media (min-width: 768px) {
            .sidebar-hidden {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-sm h-16 flex items-center px-4 justify-between fixed top-0 left-0 right-0 z-50">
        <div class="flex items-center space-x-4">
            <button id="sidebar-toggle" class="md:hidden text-gray-600 hover:text-gray-800">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <h1 class="text-xl font-bold text-gray-800">Chat App</h1>
        </div>
        <div class="flex items-center space-x-4">
            <a href="/friends.html" class="text-gray-600 hover:text-purple-600 transition" title="Friends">
                <i class="fas fa-user-friends text-xl"></i>
            </a>
            <span id="user-display" class="text-gray-600"></span>
            <button onclick="handleLogout()" class="text-gray-600 hover:text-red-500 transition">
                <i class="fas fa-sign-out-alt text-xl"></i>
            </button>
        </div>
    </nav>

    <div class="flex pt-16 chat-container">
        <div id="sidebar" class="w-full md:w-80 bg-white border-r border-gray-200 flex flex-col fixed md:relative h-full z-40 transition-transform duration-300 sidebar-hidden md:transform-none">
            <div class="p-4 border-b border-gray-200">
                <div class="flex items-center space-x-2">
                    <input type="text" id="search-input" placeholder="Search conversations..." 
                        class="flex-1 px-4 py-2 bg-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <button onclick="showNewConversationModal()" class="p-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>
            
            <div class="flex border-b border-gray-200">
                <button id="tab-chats" onclick="switchTab('chats')" class="flex-1 py-3 text-center font-medium text-purple-600 border-b-2 border-purple-600">
                    Chats
                </button>
                <button id="tab-groups" onclick="switchTab('groups')" class="flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700">
                    Groups
                </button>
            </div>

            <div id="conversation-list" class="conversation-list">
            </div>
        </div>

        <div id="chat-area" class="flex-1 flex flex-col bg-gray-50 h-full">
            <div id="no-chat-selected" class="flex-1 flex items-center justify-center">
                <div class="text-center text-gray-500">
                    <i class="fas fa-comments text-6xl mb-4"></i>
                    <p class="text-xl">Select a conversation to start chatting</p>
                </div>
            </div>

            <div id="chat-view" class="hidden flex-1 flex flex-col">
                <div id="chat-header" class="bg-white border-b border-gray-200 px-4 py-3 flex items-center">
                    <button onclick="closeChat()" class="md:hidden mr-3 text-gray-600">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="relative">
                        <div id="chat-avatar" class="w-10 h-10 rounded-full bg-purple-600 flex items-center justify-center text-white font-semibold">
                        </div>
                        <div id="chat-online-status" class="online-indicator hidden"></div>
                    </div>
                    <div class="ml-3">
                        <h3 id="chat-title" class="font-semibold text-gray-800"></h3>
                        <p id="chat-status" class="text-sm text-gray-500"></p>
                    </div>
                    <div class="ml-auto flex items-center space-x-2">
                        <button id="create-group-btn" onclick="showCreateGroupModal()" class="hidden p-2 text-gray-600 hover:text-purple-600 transition">
                            <i class="fas fa-users"></i>
                        </button>
                    </div>
                </div>

                <div id="message-list" class="message-list flex-1 p-4 space-y-4">
                </div>

                <div id="typing-indicator" class="hidden px-4 py-2 text-sm text-gray-500">
                    <span class="typing-indicator">
                        <span>.</span><span>.</span><span>.</span>
                    </span>
                    <span id="typing-user">Someone</span> is typing...
                </div>

                <div class="bg-white border-t border-gray-200 p-4">
                    <div class="flex items-center space-x-2">
                        <button class="p-2 text-gray-500 hover:text-purple-600 transition">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <input type="text" id="message-input" placeholder="Type a message..." 
                            class="flex-1 px-4 py-2 bg-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                            onkeypress="handleKeyPress(event)">
                        <button onclick="sendMessage()" class="p-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="new-conversation-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4">
            <h3 class="text-lg font-semibold mb-4">New Conversation</h3>
            <input type="text" id="new-conv-username" placeholder="Enter username" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 mb-4">
            <div class="flex justify-end space-x-2">
                <button onclick="hideNewConversationModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                <button onclick="createConversation()" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">Create</button>
            </div>
        </div>
    </div>

    <div id="create-group-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4">
            <h3 class="text-lg font-semibold mb-4">Create Group</h3>
            <input type="text" id="group-name" placeholder="Group name" 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 mb-4">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Members</label>
                <div id="group-members-list" class="space-y-2 max-h-40 overflow-y-auto">
                </div>
            </div>
            <div class="flex justify-end space-x-2">
                <button onclick="hideCreateGroupModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                <button onclick="createGroup()" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">Create</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/websocket.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
