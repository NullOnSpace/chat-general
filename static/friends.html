<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - Chat</title>
    <link rel="stylesheet" href="/css/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .tab-active {
            border-bottom: 2px solid #7c3aed;
            color: #7c3aed;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm h-16 flex items-center px-4 justify-between fixed top-0 left-0 right-0 z-50">
        <div class="flex items-center space-x-4">
            <a href="/chat.html" class="text-gray-600 hover:text-gray-800">
                <i class="fas fa-arrow-left text-xl"></i>
            </a>
            <h1 class="text-xl font-bold text-gray-800">Friends</h1>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="showAddFriendModal()" class="p-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">
                <i class="fas fa-user-plus"></i>
            </button>
        </div>
    </nav>

    <div class="pt-16 max-w-2xl mx-auto p-4">
        <div class="bg-white rounded-lg shadow">
            <div class="flex border-b">
                <button id="tab-friends" onclick="switchTab('friends')" class="flex-1 py-3 text-center font-medium tab-active">
                    Friends
                </button>
                <button id="tab-requests" onclick="switchTab('requests')" class="flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700">
                    Requests <span id="request-badge" class="hidden bg-red-500 text-white text-xs rounded-full px-2 py-0.5 ml-1">0</span>
                </button>
                <button id="tab-sent" onclick="switchTab('sent')" class="flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700">
                    Sent
                </button>
            </div>

            <div id="friends-list" class="divide-y">
            </div>

            <div id="requests-list" class="divide-y hidden">
            </div>

            <div id="sent-list" class="divide-y hidden">
            </div>
        </div>
    </div>

    <div id="add-friend-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4">
            <h3 class="text-lg font-semibold mb-4">Add Friend</h3>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">User ID</label>
                <input type="text" id="add-friend-user-id" placeholder="Enter user ID" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Message (Optional)</label>
                <textarea id="add-friend-message" placeholder="Add a message..." rows="2"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"></textarea>
            </div>
            <div class="flex justify-end space-x-2">
                <button onclick="hideAddFriendModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                <button onclick="sendNewFriendRequest()" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">Send Request</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-sm mx-4">
            <h3 class="text-lg font-semibold mb-4" id="confirm-title">Confirm</h3>
            <p class="text-gray-600 mb-4" id="confirm-message"></p>
            <div class="flex justify-end space-x-2">
                <button onclick="hideConfirmModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                <button id="confirm-btn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Confirm</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/friend.js"></script>
</body>
</html>
